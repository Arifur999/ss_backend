# Phase 1 config: HTTP only. Nginx must be running and reachable on port 80
# for certbot's HTTP-01 challenge to succeed - so don't add an HTTPS server
# block that references cert files before those certs actually exist, or
# nginx will refuse to start at all (chicken-and-egg). Once you've run
# certbot successfully (see deploy notes), uncomment the HTTPS server block
# below, replace yourdomain.com, and `docker compose restart nginx`.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Required for certbot to issue/renew the certificate.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Backend API - everything under /api/ goes to the Express app.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend static SPA. try_files falls back to index.html for any path
    # that isn't a real file, so React Router's client-side routes
    # (e.g. /products, /super-admin/owners) work on a hard refresh too.
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

