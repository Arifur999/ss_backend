# Production stack for the furniture business app: postgres + backend (this
# repo, built from ./Dockerfile) + nginx (reverse proxy + static frontend
# server). Run this from a server where hatim_Backend and Hatim are cloned
# as SIBLING folders - nginx serves ../Hatim/dist directly, no separate
# frontend container/build step needed since it's a plain static SPA.
#
# All secrets, including POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB below,
# go in the .env file already in this folder (gitignored). Docker Compose
# auto-loads it both for ${VAR} substitution here AND (via env_file below)
# to inject the app's own runtime env vars into the backend container - one
# file, two uses. Make sure DATABASE_URL in .env matches whatever you set
# POSTGRES_USER/PASSWORD/DB to, with host "postgres" (the service name
# below), not "localhost".

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-furniture_business}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not published to the host on purpose - only the backend container
    # (over the internal compose network) can reach it.

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    # Internal only - nginx is what the outside world talks to.
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../Hatim/dist:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend

  # Not started by `docker compose up` (no other service depends on it) -
  # only runs on demand, e.g.:
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
  #     -d yourdomain.com -d www.yourdomain.com --email you@example.com --agree-tos
  # Using the service name (not a guessed volume name) means this always
  # shares the exact same certbot_www/certbot_certs volumes as nginx above,
  # regardless of what Docker Compose ends up prefixing them with.
  certbot:
    image: certbot/certbot
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
